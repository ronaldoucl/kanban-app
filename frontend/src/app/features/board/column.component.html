<div class="column">
  <div class="column__header col-header">
    <span cdkDragHandle class="col-drag-handle">
      <i class="ti ti-grip-vertical" aria-hidden="true"></i>
    </span>

    @if (isEditing) {
      <div class="col-rename-wrap">
        <input
          class="col-rename-input"
          [value]="editingName"
          (input)="editingNameChanged.emit($any($event.target).value)"
          (keydown.enter)="renameConfirmed.emit()"
          (keydown.escape)="renameCancelled.emit()"
          (click)="$event.stopPropagation()"
          autofocus
        />
        <div class="col-rename-actions">
          <button class="btn-confirm" (click)="renameConfirmed.emit()">
            <i class="ti ti-check" aria-hidden="true"></i>
          </button>
          <button class="btn-cancel" (click)="renameCancelled.emit()">
            <i class="ti ti-x" aria-hidden="true"></i>
          </button>
        </div>
      </div>
    } @else {
      <span class="column__title">{{ column.title }}</span>
      <span class="column__count">{{ column.cards.length }}</span>
      <button class="col-menu-btn" (click)="menuToggled.emit($event)">
        <i class="ti ti-dots" aria-hidden="true"></i>
      </button>

      @if (activeMenu) {
        <div class="col-dropdown">
          <div class="col-dropdown-item" (click)="renameStarted.emit($event)">
            <i class="ti ti-pencil" aria-hidden="true"></i> Renombrar
          </div>
          <div class="col-dropdown-item danger" (click)="columnDeleted.emit()">
            <i class="ti ti-trash" aria-hidden="true"></i> Eliminar columna
          </div>
        </div>
      }
    }
  </div>

  <div
    cdkDropList
    [id]="column.id"
    [cdkDropListData]="column.cards"
    [cdkDropListConnectedTo]="connectedTo"
    class="column__cards"
    (cdkDropListDropped)="dropped.emit($event)"
  >
    @for (card of column.cards; track card.id) {
      <app-card [card]="card" (cardDeleted)="cardDeleted.emit($event)" />
    }
  </div>

  @if (addingCard()) {
    <div class="add-card">
      <input
        #cardInput
        type="text"
        placeholder="Título de la tarea"
        (keydown.enter)="submitCard(cardInput.value)"
        (keydown.escape)="addingCard.set(false)"
        autofocus
      />
      <div class="add-card__actions">
        <button class="btn-brand-sm" (click)="submitCard(cardInput.value)">Agregar</button>
        <button class="btn-ghost-sm" (click)="addingCard.set(false)">Cancelar</button>
      </div>
    </div>
  } @else {
    <button class="add-card-btn" (click)="addingCard.set(true)">+ Agregar tarea</button>
  }
</div>

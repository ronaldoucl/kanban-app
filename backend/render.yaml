services:
  - type: web
    name: kanflow-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    preDeployCommand: "npx prisma migrate deploy"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
